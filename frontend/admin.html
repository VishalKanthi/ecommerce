<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — ShopEasy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a href="/index.html" class="logo">Shop<span>Easy</span></a>
  <div class="nav-links">
    <a href="/index.html">← Store</a>
    <span style="color:var(--gold);font-size:0.85rem;font-weight:600;">⚡ Admin Panel</span>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Admin Panel</h1>
    <p>Manage products and orders</p>
  </div>

  <div style="display:flex;gap:0.5rem;margin-bottom:2rem;border-bottom:1px solid var(--border);">
    <button class="tab-btn" id="tab-products"
      onclick="showTab('products')"
      style="background:none;border:none;border-bottom:2px solid var(--accent);color:var(--accent);padding:0.6rem 1.2rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:600;margin-bottom:-1px;">
      Products
    </button>
    <button class="tab-btn" id="tab-orders"
      onclick="showTab('orders')"
      style="background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:0.6rem 1.2rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;margin-bottom:-1px;">
      Orders
    </button>
  </div>

  <!-- Products Tab -->
  <div id="products-tab">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.8rem;margin-bottom:2rem;">
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;">Add New Product</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="p-name" placeholder="e.g. Wireless Headphones"/>
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="p-price" placeholder="999"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="p-category">
            <option value="general">General</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="home">Home & Living</option>
            <option value="sports">Sports</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" id="p-stock" placeholder="10"/>
        </div>
      </div>
      <div class="form-group">
  <label>Product Image</label>
  <input type="file" id="p-image-file" accept="image/*" onchange="previewImage(this)"
    style="width:100%;padding:0.75rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer;"/>
  <div id="image-preview" style="margin-top:0.8rem;display:none;">
    <img id="preview-img" style="width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);"/>
  </div>
  <input type="hidden" id="p-image" />
  <div id="upload-status" style="font-size:0.82rem;color:var(--text3);margin-top:0.4rem;"></div>
</div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="p-desc" rows="2" placeholder="Short product description..."></textarea>
      </div>
      <div class="error-msg" id="add-error"></div>
      <div class="success-msg" id="add-success"></div>
      <button class="btn btn-primary" onclick="addProduct()" id="add-btn">+ Add Product</button>
    </div>
    <h3 style="font-family:'Playfair Display',serif;margin-bottom:1rem;">All Products</h3>
    <div id="admin-products-list">Loading...</div>
  </div>

  <!-- Orders Tab -->
  <div id="orders-tab" style="display:none;">
    <div id="admin-orders-list">Loading...</div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
  if (!isLoggedIn()) window.location.href = "login.html";
  if (!getUser()?.isAdmin) window.location.href = "index.html";
  updateNavbar();

  const showTab = (tab) => {
    document.getElementById("products-tab").style.display = tab==="products" ? "block" : "none";
    document.getElementById("orders-tab").style.display = tab==="orders" ? "block" : "none";
    document.getElementById("tab-products").style.color = tab==="products" ? "var(--accent)" : "var(--text3)";
    document.getElementById("tab-products").style.borderBottomColor = tab==="products" ? "var(--accent)" : "transparent";
    document.getElementById("tab-orders").style.color = tab==="orders" ? "var(--accent)" : "var(--text3)";
    document.getElementById("tab-orders").style.borderBottomColor = tab==="orders" ? "var(--accent)" : "transparent";
    if (tab === "orders") loadAdminOrders();
  };

  const loadAdminProducts = async () => {
    const container = document.getElementById("admin-products-list");
    try {
      const products = await productAPI.getAll();
      if (!products.length) {
        container.innerHTML = '<p style="color:var(--text3)">No products yet. Add one above!</p>';
        return;
      }
      container.innerHTML = `
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:0.88rem;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);color:var(--text3);">
                <th style="text-align:left;padding:0.7rem;">Name</th>
                <th style="text-align:left;padding:0.7rem;">Category</th>
                <th style="text-align:left;padding:0.7rem;">Price</th>
                <th style="text-align:left;padding:0.7rem;">Stock</th>
                <th style="text-align:left;padding:0.7rem;">Action</th>
              </tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr style="border-bottom:1px solid var(--border);">
                  <td style="padding:0.8rem;font-weight:500;">${p.name}</td>
                  <td style="padding:0.8rem;color:var(--text2);">${p.category}</td>
                  <td style="padding:0.8rem;color:var(--accent);font-weight:600;">₹${p.price.toLocaleString('en-IN')}</td>
                  <td style="padding:0.8rem;">
                    <span style="color:${p.stock>0?'var(--success)':'var(--danger)'};">${p.stock}</span>
                  </td>
                  <td style="padding:0.8rem;">
                    <button class="btn btn-danger btn-sm"
                      onclick="deleteProduct('${p._id}','${p.name}')">Delete</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (err) {
      container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
    }
  };

  const loadAdminOrders = async () => {
    const container = document.getElementById("admin-orders-list");
    try {
      const orders = await orderAPI.getAll();
      if (!orders.length) {
        container.innerHTML = '<p style="color:var(--text3)">No orders yet.</p>';
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${o._id.slice(-8).toUpperCase()}</div>
              <div class="order-date">${o.user?.name || 'User'} · ${o.user?.email || ''}</div>
            </div>
            <div style="display:flex;gap:0.8rem;align-items:center;">
              <select onchange="updateStatus('${o._id}',this.value)"
                style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.3rem 0.6rem;border-radius:8px;font-size:0.82rem;cursor:pointer;">
                <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
                <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
                <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
              </select>
              <span class="status-badge status-${o.status}">${o.status}</span>
            </div>
          </div>
          <div style="color:var(--text2);font-size:0.85rem;margin-bottom:0.5rem;">
            ${o.items.map(i=>`${i.name} ×${i.quantity}`).join(' · ')}
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--text3);font-size:0.82rem;">${o.address.substring(0,60)}...</span>
            <span style="font-weight:700;">₹${o.total.toLocaleString('en-IN')}</span>
          </div>
        </div>`).join('');
    } catch (err) {
      container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
    }
  };
const previewImage = (input) => {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById("preview-img").src = e.target.result;
      document.getElementById("image-preview").style.display = "block";
    };
    reader.readAsDataURL(file);
  }
};

const uploadImage = async (file) => {
  const statusEl = document.getElementById("upload-status");
  statusEl.textContent = "Uploading image...";
  statusEl.style.color = "var(--text3)";

  const formData = new FormData();
  formData.append("image", file);

  const token = localStorage.getItem("token");
  const res = await fetch("https://ecommerce-backend-6std.onrender.com/api/upload", {
    method: "POST",
    headers: { "Authorization": `Bearer ${token}` },
    body: formData
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.message);

  statusEl.textContent = "✓ Image uploaded!";
  statusEl.style.color = "var(--success)";
  return data.url;
};
const addProduct = async () => {
  const name = document.getElementById("p-name").value.trim();
  const price = Number(document.getElementById("p-price").value);
  const category = document.getElementById("p-category").value;
  const stock = Number(document.getElementById("p-stock").value);
  const description = document.getElementById("p-desc").value.trim();
  const imageFile = document.getElementById("p-image-file").files[0];
  const errorEl = document.getElementById("add-error");
  const successEl = document.getElementById("add-success");
  const btn = document.getElementById("add-btn");

  errorEl.className = "error-msg";

  if (!name || !price || !stock) {
    errorEl.textContent = "Name, price and stock are required";
    errorEl.className = "error-msg show";
    return;
  }

  btn.textContent = "Adding...";
  btn.disabled = true;

  try {
    let imageUrl = "";
    if (imageFile) {
      imageUrl = await uploadImage(imageFile);
    }

    await productAPI.create({ name, price, category, stock, description, image: imageUrl });

    successEl.textContent = `✓ "${name}" added successfully!`;
    successEl.className = "success-msg show";

    ["p-name","p-price","p-stock","p-desc"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("p-image-file").value = "";
    document.getElementById("image-preview").style.display = "none";
    document.getElementById("upload-status").textContent = "";

    btn.textContent = "+ Add Product";
    btn.disabled = false;
    loadAdminProducts();
    setTimeout(() => successEl.className = "success-msg", 3000);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.className = "error-msg show";
    btn.textContent = "+ Add Product";
    btn.disabled = false;
  }
};

  const deleteProduct = async (id, name) => {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      await productAPI.remove(id);
      showToast(`"${name}" deleted`);
      loadAdminProducts();
    } catch (err) { showToast(err.message, "error"); }
  };

  const updateStatus = async (id, status) => {
    try {
      await orderAPI.updateStatus(id, status);
      showToast(`Order updated to ${status}`);
    } catch (err) { showToast(err.message, "error"); }
  };

  loadAdminProducts();
</script>
</body>
</html>
