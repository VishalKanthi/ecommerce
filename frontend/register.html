<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ShopEasy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Shop<span>Easy</span></a>
  <div class="nav-links">
    <a href="index.html">← Back to Store</a>
  </div>
</nav>

<div class="page-center">
  <div class="form-card">
    <h2>Create account</h2>
    <p class="subtitle">Join thousands of happy shoppers today</p>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe"/>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"
        onkeydown="if(event.key==='Enter') handleRegister()"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="handleRegister()" id="reg-btn">
      Create Account →
    </button>
    <div class="form-divider">or</div>
    <p style="text-align:center;font-size:0.88rem;color:var(--text2);">
      Already have an account?
      <a href="login.html" style="color:var(--accent);font-weight:600;">Sign in</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (isLoggedIn()) window.location.href = "index.html";

  const handleRegister = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error-msg");
    const successEl = document.getElementById("success-msg");
    const btn = document.getElementById("reg-btn");
    errorEl.className = "error-msg";
    if (!name || !email || !password) {
      errorEl.textContent = "Please fill in all fields";
      errorEl.className = "error-msg show"; return;
    }
    if (password.length < 6) {
      errorEl.textContent = "Password must be at least 6 characters";
      errorEl.className = "error-msg show"; return;
    }
    btn.textContent = "Creating account..."; btn.disabled = true;
    try {
      const data = await authAPI.register({ name, email, password });
      saveUser(data);
      successEl.textContent = "Account created! Redirecting...";
      successEl.className = "success-msg show";
      setTimeout(() => window.location.href = "index.html", 1200);
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.className = "error-msg show";
      btn.textContent = "Create Account →"; btn.disabled = false;
    }
  };
</script>
</body>
</html>
