<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — ShopEasy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a href="/index.html" class="logo">Shop<span>Easy</span></a>
  <div class="nav-links">
    <a href="/index.html">← Continue Shopping</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Your Cart</h1>
    <p id="cart-subtitle">Loading...</p>
  </div>
  <div class="cart-layout" id="cart-layout"></div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
  updateNavbar();

  const renderCart = () => {
    const cart = getCart();
    const layout = document.getElementById("cart-layout");
    const subtitle = document.getElementById("cart-subtitle");

    if (!cart.length) {
      subtitle.textContent = "0 items";
      layout.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet</p>
          <a href="/index.html" class="btn btn-primary">Start Shopping →</a>
        </div>`;
      return;
    }

    subtitle.textContent = `${cart.length} item${cart.length>1?'s':''} in your cart`;
    const total = getCartTotal();
    const shipping = total > 500 ? 0 : 49;
    const grandTotal = total + shipping;

    layout.innerHTML = `
      <div>
        ${cart.map(item => `
          <div class="cart-item">
            <img class="cart-item-img"
              src="${item.image || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&q=80'}"
              alt="${item.name}" />
            <div class="cart-item-info">
              <h4>${item.name}</h4>
              <div class="cart-item-qty">Quantity: ${item.quantity}</div>
              <div class="cart-item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;">
              <div style="color:var(--text3);font-size:0.82rem;">₹${item.price.toLocaleString('en-IN')} each</div>
              <button class="btn btn-danger btn-sm"
                onclick="removeFromCart('${item.productId}'); renderCart();">Remove</button>
            </div>
          </div>`).join('')}
        <button class="btn btn-ghost btn-sm"
          onclick="if(confirm('Clear cart?')){clearCart();renderCart();}">
          🗑 Clear Cart
        </button>
      </div>
      <div>
        <div class="summary-card">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>₹${total.toLocaleString('en-IN')}</span></div>
          <div class="summary-row"><span>Shipping</span>
            <span>${shipping===0 ? '<span style="color:var(--success)">FREE</span>' : '₹'+shipping}</span>
          </div>
          ${shipping > 0 ? `<div style="font-size:0.78rem;color:var(--text3);margin-bottom:0.5rem;">Add ₹${(500-total)} more for free shipping</div>` : ''}
          <div class="summary-row total"><span>Total</span><span>₹${grandTotal.toLocaleString('en-IN')}</span></div>
          <button class="btn btn-primary btn-full" style="margin-top:1.2rem;" onclick="proceedToCheckout()">
            Checkout →
          </button>
          <a href="/index.html" class="btn btn-ghost btn-full" style="margin-top:0.6rem;text-align:center;">
            Continue Shopping
          </a>
        </div>
      </div>`;
  };

  const proceedToCheckout = () => {
    if (!isLoggedIn()) { window.location.href = "login.html"; return; }
    if (!getCart().length) { showToast("Your cart is empty!", "error"); return; }
    window.location.href = "checkout.html";
  };

  renderCart();
</script>
</body>
</html>
